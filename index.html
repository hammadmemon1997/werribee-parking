<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Werribee Station Parking</title>
  <meta name="theme-color" content="#1c2b3a"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f8f5f0;font-family:Georgia,serif;min-height:100vh}
    .header{background:#1c2b3a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-title{color:#f0e6d3;font-size:15px;font-weight:700}
    .header-sub{color:#5d7a8a;font-size:10px;letter-spacing:3px;font-family:monospace}
    .wrap{max-width:580px;margin:0 auto;padding:16px}
    .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .verdict-card{border-radius:18px;padding:24px 20px;margin-bottom:14px}
    .verdict-text{font-size:36px;font-weight:900;letter-spacing:-1px;line-height:1}
    .verdict-sub{font-size:13px;color:#475569;margin-top:5px}
    .pct{font-size:32px;font-weight:900}
    .bar-wrap{height:10px;background:rgba(0,0,0,0.08);border-radius:5px;overflow:hidden;margin:12px 0}
    .bar-fill{height:100%;border-radius:5px;transition:width 1.4s ease}
    .pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;margin:3px}
    .btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;letter-spacing:0.5px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .mini-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
    .mini-label{font-size:9px;color:#94a3b8;letter-spacing:2px;font-family:monospace;margin-bottom:4px}
    .mini-val{font-size:18px;font-weight:800}
    .signal-row{display:flex;align-items:center;gap:8px;font-size:12px}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .action-btn{padding:12px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;text-align:center}
    .footer{text-align:center;font-size:10px;color:#94a3b8;font-family:monospace;padding:20px 16px;letter-spacing:1px}
    .loading{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
    .tag{font-size:10px;color:#475569;letter-spacing:3px;font-family:monospace;margin-bottom:4px}
  </style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">🚉 Werribee Station Parking</div>
    <div class="header-sub" id="header-sub">LOADING...</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="weather-badge" style="text-align:right"></div>
    <button onclick="refresh()" style="background:transparent;border:1px solid #2d4a5a;color:#5d7a8a;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:13px" id="refresh-btn">🔄</button>
  </div>
</div>

<div class="wrap">
  <div id="alerts"></div>
  <div id="verdict-wrap" class="loading">Loading parking data...</div>
  <div class="grid2" id="mini-cards"></div>
  <div class="action-row">
    <button class="action-btn" onclick="window.open('https://maps.google.com/?q=Werribee+Station+Car+Park,+Werribee+VIC','_blank')">🗺️ Google Maps</button>
    <button class="action-btn" onclick="toggleHourly()">📊 Hourly Chart</button>
    <button class="action-btn" onclick="submitReport()">👥 Report</button>
    <button class="action-btn" onclick="showForecast()">🌤️ 7-Day</button>
  </div>
  <div id="hourly-chart" style="display:none" class="card">
    <div class="tag">TODAY'S HOURLY FORECAST</div>
    <div id="chart-bars" style="display:flex;align-items:flex-end;gap:2px;height:80px;margin-top:8px"></div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;font-family:monospace;margin-top:4px">
      <span>12AM</span><span>6AM</span><span>12PM</span><span>6PM</span><span>11PM</span>
    </div>
  </div>
  <div id="forecast-panel" style="display:none" class="card">
    <div class="tag">7-DAY OUTLOOK</div>
    <div id="forecast-content" style="margin-top:8px"></div>
  </div>
  <div id="report-panel" style="display:none" class="card">
    <div class="tag">SUBMIT REPORT</div>
    <div style="margin-top:10px">
      <div style="margin-bottom:8px;font-size:12px;color:#64748b">Zone:</div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button onclick="setZone('A')" id="zone-A" class="action-btn" style="flex:1">A</button>
        <button onclick="setZone('B')" id="zone-B" class="action-btn" style="flex:1">B</button>
        <button onclick="setZone('C')" id="zone-C" class="action-btn" style="flex:1">C</button>
        <button onclick="setZone('D')" id="zone-D" class="action-btn" style="flex:1">D</button>
      </div>
      <div style="margin-bottom:8px;font-size:12px;color:#64748b">Status:</div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button onclick="setType('full')" id="type-full" class="action-btn" style="flex:1">🔴 Full</button>
        <button onclick="setType('busy')" id="type-busy" class="action-btn" style="flex:1">🟡 Busy</button>
        <button onclick="setType('spaces')" id="type-spaces" class="action-btn" style="flex:1">🟢 Spaces</button>
      </div>
      <button onclick="confirmReport()" class="btn" style="background:#8b5cf6;color:#fff">Submit Report</button>
    </div>
  </div>
  <div class="footer">WERRIBEE STATION PARKING ADVISOR · DATA: OPEN-METEO + PTV<br>INDIVIDUAL SPOT DATA IS ESTIMATED — NOT REAL SENSORS</div>
</div>

<script>
const BASE = [2,2,2,2,3,5,18,72,91,80,62,55,50,52,58,65,80,88,74,50,30,18,10,5];
const WKND = [2,2,2,2,2,3,5,15,28,32,28,24,20,22,24,26,28,25,20,14,10,6,4,2];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const WICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌦️',63:'🌧️',65:'⛈️',80:'🌦️',81:'🌧️',95:'⛈️'};
const WCODES = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',51:'Drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',80:'Showers',81:'Heavy showers',95:'Thunderstorm'};

let weather = null, disruptions = [], reports = [], selZone = 'A', selType = 'full';

function fmt12(h){ return h===0?'12AM':h<12?h+'AM':h===12?'12PM':(h-12)+'PM'; }
function getVerdict(p){
  if(p>=90) return {text:'STAY HOME',sub:'Car park is full — leave 40+ min early.',color:'#dc2626',bg:'rgba(220,38,38,0.1)',emoji:'🛑'};
  if(p>=75) return {text:'RISKY',    sub:'Very busy — leave right now.',           color:'#ea580c',bg:'rgba(234,88,12,0.1)',emoji:'⚠️'};
  if(p>=55) return {text:'MODERATE', sub:'Filling up — leave soon.',               color:'#d97706',bg:'rgba(217,119,6,0.1)',emoji:'🟡'};
  if(p>=30) return {text:'GOOD',     sub:'Decent availability. Normal timing fine.',color:'#16a34a',bg:'rgba(22,163,74,0.1)',emoji:'✅'};
  return           {text:'EASY',     sub:'Plenty of spaces. No rush!',              color:'#0284c7',bg:'rgba(2,132,199,0.1)',emoji:'🅿️'};
}
function weatherDelta(code, precip){
  if(code>=61||precip>2) return {d:+14,label:'Rain → more drivers',icon:'🌧️'};
  if(code>=51||precip>0.5) return {d:+8,label:'Drizzle → extra cars',icon:'🌦️'};
  if(code===3) return {d:+3,label:'Overcast',icon:'☁️'};
  if(code===0||code===1) return {d:-4,label:'Fine → some walk/cycle',icon:'☀️'};
  return {d:0,label:'Neutral',icon:'🌤️'};
}

async function refresh(){
  const now = new Date();
  const h = now.getHours();
  const dow = now.getDay();
  const isWknd = dow===0||dow===6;
  const base = isWknd ? WKND : BASE;

  document.getElementById('refresh-btn').textContent = '⏳';
  document.getElementById('header-sub').textContent = 'SYNCING...';

  // Fetch weather
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-37.9027&longitude=144.6627&current=temperature_2m,precipitation,weathercode,windspeed_10m&hourly=precipitation_probability&timezone=Australia%2FSydney&forecast_days=7`);
    const d = await r.json();
    const c = d.current;
    weather = {temp:Math.round(c.temperature_2m),precip:c.precipitation,code:c.weathercode,wind:Math.round(c.windspeed_10m),daily:d.daily,hourlyPrecipProb:d.hourly?.precipitation_probability};
  } catch(e){ weather = null; }

  // Fetch PTV
  disruptions = [];
  try {
    const r = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://www.ptv.vic.gov.au/disruptions/werribee-line-disruptions/nochrome'));
    const d = await r.json();
    const html = d.contents||'';
    if(html.toLowerCase().includes('replacement bus')) disruptions.push({type:'warning',text:'Bus replacements on Werribee line — MORE parking demand today'});
    if(html.toLowerCase().includes('altered timetable')) disruptions.push({type:'info',text:'Altered timetable in effect'});
  } catch(e){}

  // Crowd reports (localStorage)
  try { reports = JSON.parse(localStorage.getItem('crowd_reports')||'[]'); } catch{ reports=[]; }
  const recentReports = reports.filter(r=>Date.now()-r.ts<30*60*1000);
  const crowdDelta = recentReports.reduce((a,r)=>a+(r.type==='full'?6:r.type==='spaces'?-5:0),0);

  const wd = weather ? weatherDelta(weather.code, weather.precip) : {d:0,label:'Loading',icon:'⏳'};
  const dd = disruptions.some(d=>d.text.includes('MORE'))?12:0;
  const pct = Math.min(99,Math.max(1,(base[h]??50)+wd.d+dd+crowdDelta));
  const v = getVerdict(pct);
  const free = Math.round(120*(1-pct/100));

  // Update header
  document.getElementById('header-sub').textContent = `${DAYS[dow].toUpperCase()} ${fmt12(h)} · LIVE`;
  if(weather){
    document.getElementById('weather-badge').innerHTML = `<div style="color:#f0e6d3;font-size:15px">${WICONS[weather.code]||'🌤️'} ${weather.temp}°C</div><div style="color:#5d7a8a;font-size:9px;font-family:monospace">${(WCODES[weather.code]||'').slice(0,12)}</div>`;
  }

  // Alerts
  let alertHtml = '';
  disruptions.forEach(d=>{
    const bg = d.type==='warning'?'rgba(220,38,38,0.08)':'rgba(2,132,199,0.08)';
    const col = d.type==='warning'?'#dc2626':'#0284c7';
    alertHtml += `<div style="background:${bg};border:1px solid ${col}44;border-radius:8px;padding:10px 14px;margin-bottom:10px;color:${col};font-size:12px">${d.type==='warning'?'⚠️':'ℹ️'} <strong>PTV Alert:</strong> ${d.text}</div>`;
  });
  if(recentReports.length>0){
    alertHtml += `<div style="background:rgba(139,92,246,0.08);border:1px solid #8b5cf633;border-radius:8px;padding:10px 14px;margin-bottom:10px;color:#7c3aed;font-size:12px">👥 <strong>${recentReports.length} community report${recentReports.length>1?'s':''}</strong> in last 30 min — adjusted ${crowdDelta>0?'+':''}${crowdDelta}%</div>`;
  }
  document.getElementById('alerts').innerHTML = alertHtml;

  // Verdict card
  const findMins = pct>=95?'15-25':pct>=85?'8-15':pct>=70?'3-8':pct>=45?'1-3':'<1';
  document.getElementById('verdict-wrap').innerHTML = `
    <div class="verdict-card" style="background:${v.bg};border:2px solid ${v.color}44;position:relative;overflow:hidden">
      <div style="position:absolute;right:-10px;top:-10px;font-size:90px;opacity:0.06;user-select:none">${v.emoji}</div>
      <div class="tag">RIGHT NOW · ${DAYS[dow].toUpperCase()} ${fmt12(h)}</div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div>
          <div class="verdict-text" style="color:${v.color}">${v.text}</div>
          <div class="verdict-sub">${v.sub}</div>
        </div>
        <div style="text-align:center">
          <div class="pct" style="color:${v.color}">${pct}%</div>
          <div style="font-size:9px;color:#94a3b8;font-family:monospace">FULL</div>
          <div style="font-size:14px;font-weight:700;color:${v.color};margin-top:2px">${free} free</div>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,#22c55e,${v.color})"></div></div>
      <div style="margin-bottom:14px">
        <span class="pill" style="background:rgba(255,255,255,0.6);color:#475569">${wd.icon} ${wd.label} <span style="font-family:monospace;font-size:9px;color:#94a3b8">${wd.d>0?'+'+wd.d:wd.d}%</span></span>
        ${dd>0?`<span class="pill" style="background:rgba(220,38,38,0.1);color:#dc2626">🚌 Bus replace +${dd}%</span>`:''}
        ${crowdDelta!==0?`<span class="pill" style="background:rgba(139,92,246,0.1);color:#7c3aed">👥 Reports ${crowdDelta>0?'+':''}${crowdDelta}%</span>`:''}
      </div>
      <div style="background:rgba(255,255,255,0.5);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:10px;color:#64748b;letter-spacing:2px;font-family:monospace">⏱ EST. TIME TO FIND A SPOT</div>
          <div style="font-size:20px;font-weight:800;color:${v.color};margin-top:2px">${findMins} mins</div>
        </div>
      </div>
      <button class="btn" onclick="window.open('https://maps.google.com/?q=Werribee+Station+Car+Park,+Werribee+VIC','_blank')" style="background:${v.color};color:#fff;box-shadow:0 4px 20px ${v.color}55">
        🅿️ Open Google Maps → ${free} estimated free
      </button>
    </div>`;

  // Mini cards
  const todayBase = base.map(b=>Math.min(99,b+wd.d));
  const bestHour = todayBase.slice(5,11).reduce((best,v,i)=>v<todayBase[best+5]?i+5:best,5)+5;
  document.getElementById('mini-cards').innerHTML = `
    <div class="mini-card"><div class="mini-label">BEST LEAVE TIME</div><div class="mini-val" style="color:#16a34a">${fmt12(bestHour)}</div><div style="font-size:11px;color:#64748b">${todayBase[bestHour]}% predicted</div></div>
    <div class="mini-card"><div class="mini-label">WEATHER</div><div class="mini-val">${weather?`${WICONS[weather.code]||'🌤️'} ${weather.temp}°C`:'–'}</div><div style="font-size:11px;color:#64748b">${weather?`${weather.wind}km/h wind`:'Loading...'}</div></div>
    <div class="mini-card"><div class="mini-label">FREE SPOTS</div><div class="mini-val" style="color:${v.color}">${free}</div><div style="font-size:11px;color:#64748b">of 120 total</div></div>
    <div class="mini-card"><div class="mini-label">PTV STATUS</div><div class="mini-val">${disruptions.length>0?'⚠️':'✅'}</div><div style="font-size:11px;color:#64748b">${disruptions.length>0?'Disruptions':'Normal service'}</div></div>`;

  // Hourly chart
  const bars = BASE.map((b,i)=>{
    const p = Math.min(99,b+wd.d);
    const col = p>=75?'#ef4444':p>=55?'#f97316':p>=30?'#16a34a':'#0284c7';
    const isNow = i===h;
    return `<div style="flex:1;background:${col}${isNow?'':'88'};border-radius:2px 2px 0 0;height:${p}%;position:relative;min-height:4px" title="${fmt12(i)}: ${p}%">${isNow?'<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:#1c2b3a;font-weight:700;white-space:nowrap">NOW</div>':''}</div>`;
  }).join('');
  document.getElementById('chart-bars').innerHTML = bars;

  // 7-day forecast
  if(weather?.daily){
    const d = weather.daily;
    let fc = '';
    for(let i=0;i<Math.min(7,d.time?.length||0);i++){
      const date = new Date(d.time[i]);
      const dayName = DAYS[date.getDay()];
      const maxT = d.temperature_2m_max?.[i]||'–';
      const minT = d.temperature_2m_min?.[i]||'–';
      const code = d.weathercode?.[i]||0;
      const isWknd2 = date.getDay()===0||date.getDay()===6;
      const mornPct = Math.round((isWknd2?WKND[8]:BASE[8]));
      const stars = mornPct>=80?'⭐':mornPct>=60?'⭐⭐':'⭐⭐⭐';
      fc += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px">
        <div style="width:80px;font-weight:${i===0?700:400};color:${i===0?'#1c2b3a':'#475569'}">${i===0?'Today':dayName}</div>
        <div>${WICONS[code]||'🌤️'} ${Math.round(maxT)}°/${Math.round(minT)}°</div>
        <div style="color:#64748b">8AM: ~${mornPct}% ${stars}</div>
      </div>`;
    }
    document.getElementById('forecast-content').innerHTML = fc || '<div style="color:#94a3b8;font-size:12px">No forecast data</div>';
  }

  document.getElementById('refresh-btn').textContent = '🔄';
  document.getElementById('header-sub').textContent = `${DAYS[dow].toUpperCase()} ${fmt12(h)} · UPDATED ${new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`;
}

function toggleHourly(){
  const el = document.getElementById('hourly-chart');
  el.style.display = el.style.display==='none'?'block':'none';
}
function showForecast(){
  const el = document.getElementById('forecast-panel');
  el.style.display = el.style.display==='none'?'block':'none';
}
function submitReport(){
  const el = document.getElementById('report-panel');
  el.style.display = el.style.display==='none'?'block':'none';
}
function setZone(z){
  selZone=z;
  ['A','B','C','D'].forEach(x=>{
    document.getElementById('zone-'+x).style.background=x===z?'#3b82f6':'#fff';
    document.getElementById('zone-'+x).style.color=x===z?'#fff':'inherit';
  });
}
function setType(t){
  selType=t;
  ['full','busy','spaces'].forEach(x=>{
    document.getElementById('type-'+x).style.background=x===t?'#8b5cf6':'#fff';
    document.getElementById('type-'+x).style.color=x===t?'#fff':'inherit';
  });
}
function confirmReport(){
  try{
    let r = JSON.parse(localStorage.getItem('crowd_reports')||'[]');
    r.push({zone:selZone,type:selType,ts:Date.now()});
    r = r.slice(-20);
    localStorage.setItem('crowd_reports',JSON.stringify(r));
  }catch(e){}
  document.getElementById('report-panel').style.display='none';
  alert(`Report submitted: Zone ${selZone} is ${selType}. Thanks!`);
  refresh();
}

// Auto-refresh every 10 min
refresh();
setInterval(refresh, 10*60*1000);
</script>
</body>
</html>
